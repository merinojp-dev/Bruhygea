<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Note Studio v1.4 - Alinhamento Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-stone-100 min-h-screen p-4 md:p-8 text-slate-900">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border border-stone-200">
        <!-- Cabeçalho -->
        <div class="bg-indigo-900 p-6 text-white flex justify-between items-center border-b-4 border-indigo-700">
            <div>
                <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    Note Studio v1.4
                </h1>
                <p class="opacity-80 mt-1 text-xs uppercase tracking-widest">Alinhamento e Nomenclatura Final</p>
            </div>
            <div id="statusBadge" class="hidden sm:block">
                <span class="bg-green-500/20 text-green-300 px-3 py-1 rounded-full text-[10px] font-bold border border-green-500/30">V1.4 PRO</span>
            </div>
        </div>

        <div class="p-6 space-y-6">
            <!-- Painel de Configuração -->
            <div class="grid md:grid-cols-2 gap-6 bg-slate-50 p-6 rounded-xl border border-slate-200">
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold mb-1 text-slate-500 uppercase tracking-widest">1. Ficheiro PDF</label>
                        <input type="file" id="fileInput" class="hidden" accept=".pdf" />
                        <button onclick="document.getElementById('fileInput').click()" id="fileBtn" class="w-full py-3 px-4 border-2 border-dashed border-indigo-300 rounded-lg text-sm text-indigo-700 font-semibold hover:bg-indigo-100 transition-all truncate text-left">
                            Selecionar Slides
                        </button>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold mb-1 text-slate-500 uppercase tracking-widest">2. Título Disciplina</label>
                        <input type="text" id="headerDisciplina" placeholder="Ex: IMUNOLOGIA CONTRA VIRUS" class="w-full p-2.5 text-sm border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold mb-1 text-slate-500 uppercase tracking-widest">Slides/Pág</label>
                            <select id="slidesCount" class="w-full p-2.5 text-sm border border-slate-300 rounded-lg outline-none bg-white">
                                <option value="3" selected>3 Slides</option>
                                <option value="2">2 Slides</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold mb-1 text-slate-500 uppercase tracking-widest">Lado Slide</label>
                            <select id="side" class="w-full p-2.5 text-sm border border-slate-300 rounded-lg outline-none bg-white">
                                <option value="left" selected>Esquerda</option>
                                <option value="right">Direita</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 p-3 bg-white rounded-lg border border-slate-200 shadow-sm">
                        <input type="checkbox" id="eyeComfort" checked class="w-5 h-5 rounded text-amber-600 focus:ring-amber-500 border-slate-300">
                        <label for="eyeComfort" class="text-[10px] font-bold text-slate-600 uppercase">Filtro Marfim</label>
                    </div>
                </div>
            </div>

            <button id="processBtn" disabled class="w-full py-5 rounded-xl font-bold text-lg flex items-center justify-center gap-3 transition-all bg-slate-300 text-slate-500 cursor-not-allowed">
                <span id="btnIcon">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                </span>
                <span id="btnText">Gerar Caderno Otimizado</span>
            </button>
            
            <div id="errorMessage" class="hidden p-4 bg-red-50 border border-red-200 rounded-lg text-red-600 text-xs italic"></div>
        </div>

        <!-- Preview Simplificado -->
        <div class="bg-stone-200 p-8 flex justify-center border-t border-slate-200">
            <div class="w-64 h-80 bg-white shadow-2xl rounded-sm border border-slate-400 p-4 relative overflow-hidden flex flex-col">
                <div class="h-2 w-3/4 bg-slate-400 rounded-full mb-1"></div>
                <div class="h-[1px] w-full bg-slate-300 mb-6"></div>
                
                <div class="flex gap-2">
                    <div class="w-[45%] h-14 bg-slate-100 rounded border border-slate-200 relative">
                         <div class="absolute -top-3 right-0 flex gap-1">
                             <div class="w-2 h-2 text-slate-400 text-[8px]">★</div>
                             <div class="w-2 h-2 rounded-full border border-slate-400"></div>
                             <div class="text-[6px] text-slate-400">Slide 01/01</div>
                         </div>
                    </div>
                    <div class="flex-1 border border-slate-500 rounded h-14 bg-white"></div>
                </div>
                <div class="absolute bottom-2 right-2 text-[5px] text-slate-400 font-mono italic text-right">v1.4<br>ALIGNMENT FINAL</div>
            </div>
        </div>
    </div>

    <script>
        const { PDFDocument, rgb } = PDFLib;

        let selectedFile = null;
        const els = {
            fileInput: document.getElementById('fileInput'),
            fileBtn: document.getElementById('fileBtn'),
            processBtn: document.getElementById('processBtn'),
            btnText: document.getElementById('btnText'),
            btnIcon: document.getElementById('btnIcon'),
            headerDisc: document.getElementById('headerDisciplina'),
            errorMessage: document.getElementById('errorMessage')
        };

        const STAR_PATH = "M 5 0 L 6.18 3.63 L 10 3.63 L 6.91 5.88 L 8.09 9.51 L 5 7.27 L 1.91 9.51 L 3.09 5.88 L 0 3.63 L 3.82 3.63 Z";

        els.fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                selectedFile = file;
                els.fileBtn.textContent = file.name;
                els.processBtn.disabled = false;
                els.processBtn.classList.remove('bg-slate-300', 'text-slate-500', 'cursor-not-allowed');
                els.processBtn.classList.add('bg-indigo-700', 'text-white', 'hover:bg-indigo-800', 'shadow-xl');
                
                if(!els.headerDisc.value) {
                    els.headerDisc.value = file.name.replace(/\.[^/.]+$/, "").toUpperCase();
                }
                els.errorMessage.classList.add('hidden');
            }
        };

        els.processBtn.onclick = async () => {
            if (!selectedFile) return;
            
            els.processBtn.disabled = true;
            els.btnText.textContent = "Alinhando Elementos...";
            els.btnIcon.innerHTML = '<div class="spinner"></div>';

            try {
                const arrayBuffer = await selectedFile.arrayBuffer();
                const srcDoc = await PDFDocument.load(arrayBuffer);
                const outDoc = await PDFDocument.create();
                
                const pages = srcDoc.getPages();
                const totalSlides = pages.length;
                const slidesPerPage = parseInt(document.getElementById('slidesCount').value);
                const totalPagesNeeded = Math.ceil(totalSlides / slidesPerPage);
                const isLeft = document.getElementById('side').value === 'left';
                const useEyeComfort = document.getElementById('eyeComfort').checked;

                for (let p = 0; p < totalPagesNeeded; p++) {
                    const page = outDoc.addPage([595.28, 841.89]);
                    const { width: a4W, height: a4H } = page.getSize();
                    
                    if (useEyeComfort) {
                        page.drawRectangle({ x: 0, y: 0, width: a4W, height: a4H, color: rgb(1, 0.98, 0.94) });
                    }

                    const margin = 40;
                    const headerY = a4H - margin;
                    const title = els.headerDisc.value || "ESTUDO";

                    // Cabeçalho
                    page.drawText(title, { x: margin, y: headerY, size: 10, color: rgb(0.1, 0.1, 0.1) });
                    page.drawLine({
                        start: { x: margin, y: headerY - 10 },
                        end: { x: a4W - margin, y: headerY - 10 },
                        thickness: 1, color: rgb(0.2, 0.2, 0.2)
                    });

                    const workingAreaY = headerY - 45;
                    const slotH = (workingAreaY - margin) / (slidesPerPage + 0.1); 
                    const slideColW = a4W * 0.42;
                    const notesColW = a4W - (margin * 2) - slideColW - 15;

                    for (let s = 0; s < slidesPerPage; s++) {
                        const idx = (p * slidesPerPage) + s;
                        if (idx >= totalSlides) break;

                        const slidePage = pages[idx];
                        const embedded = await outDoc.embedPage(slidePage);
                        const { width: sW, height: sH } = slidePage.getSize();

                        const scale = Math.min(slideColW / sW, (slotH * 0.85) / sH);
                        const finalW = sW * scale;
                        const finalH = sH * scale;

                        const slotCenterY = (workingAreaY - (s * slotH)) - (slotH / 2);
                        const slideX = isLeft ? margin : a4W - margin - finalW;
                        const slideY = slotCenterY - (finalH / 2);

                        // Moldura Slide
                        page.drawRectangle({
                            x: slideX, y: slideY, width: finalW, height: finalH,
                            borderColor: rgb(0.85, 0.85, 0.85), borderWidth: 0.5
                        });
                        page.drawPage(embedded, { x: slideX, y: slideY, width: finalW, height: finalH });

                        // --- ALINHAMENTO SUPERIOR (Y-Baseline Sincronizado) ---
                        const topBaselineY = slideY + finalH + 6;

                        // Slide Info (XX/YY) no canto DIREITO do slide
                        const slideInfo = `Slide ${(idx + 1).toString().padStart(2, '0')}/${totalSlides.toString().padStart(2, '0')}`;
                        page.drawText(slideInfo, { x: slideX + finalW - 48, y: topBaselineY, size: 7, color: rgb(0.3, 0.3, 0.3) });

                        // Ícones de Pintar (Círculo e Estrela) - Juntos à esquerda do texto do slide
                        // Círculo
                        page.drawCircle({
                            x: slideX + finalW - 60, y: topBaselineY + 3, size: 4.5,
                            borderColor: rgb(0.6, 0.6, 0.6), borderWidth: 0.8
                        });
                        
                        // Estrela
                        page.drawSvgPath(STAR_PATH, {
                            x: slideX + finalW - 74,
                            y: topBaselineY + 8, 
                            scale: 0.7,
                            borderColor: rgb(0.6, 0.6, 0.6),
                            borderWidth: 0.8
                        });

                        // --- CAIXA DE NOTAS ---
                        const gridX = isLeft ? margin + slideColW + 15 : margin;
                        const gridY = slideY;
                        const gridW = notesColW;
                        const gridH = finalH;

                        page.drawRectangle({
                            x: gridX, y: gridY, width: gridW, height: gridH,
                            borderColor: rgb(0.4, 0.4, 0.4), borderWidth: 1
                        });

                        // Ícone Monitor (Professor) - Alinhado com a linha de base dos outros ícones
                        page.drawRectangle({
                            x: gridX + 4, y: topBaselineY - 2, width: 8, height: 6,
                            borderColor: rgb(0.5, 0.5, 0.5), borderWidth: 0.7
                        });
                        page.drawLine({
                            start: { x: gridX + 6, y: topBaselineY - 2 },
                            end: { x: gridX + 6, y: topBaselineY - 4 },
                            thickness: 0.5, color: rgb(0.5, 0.5, 0.5)
                        });

                        // Linhas Pontilhadas
                        const spacing = 14;
                        let lineY = gridY + gridH - spacing;
                        while (lineY > gridY + 4) {
                            page.drawLine({
                                start: { x: gridX + 4, y: lineY },
                                end: { x: gridX + gridW - 4, y: lineY },
                                thickness: 0.3, color: rgb(0.8, 0.8, 0.8),
                                dashArray: [1, 2]
                            });
                            lineY -= spacing;
                        }
                    }
                }

                const pdfBytes = await outDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                // REMOVIDO PREFIXO _NOTAS
                a.download = `${els.headerDisc.value}.pdf`;
                a.click();
                
                els.btnText.textContent = "Concluído!";
                els.btnIcon.innerHTML = '✅';
                setTimeout(() => {
                    els.btnText.textContent = "Gerar Caderno Otimizado";
                    els.btnIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>';
                    els.processBtn.disabled = false;
                }, 2000);

            } catch (err) {
                console.error(err);
                els.errorMessage.textContent = `Erro: ${err.message}`;
                els.errorMessage.classList.remove('hidden');
                els.btnText.textContent = "Erro!";
                els.btnIcon.innerHTML = '❌';
                els.processBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
